# ============================================================
#  JWT Cookies Demo - application.properties
#  Proyecto educativo: Autenticacion JWT + Cookies
# ============================================================

server.port=8080
spring.application.name=JWT-Cookies-Demo

# ---- JWT Configuration ----
# Clave secreta para firmar el JWT.
# jjwt elige el algoritmo segun el tamaño:
#   32 chars (256 bits) → HS256
#   48 chars (384 bits) → HS384
#   64+ chars (512 bits) → HS512
# Esta clave tiene exactamente 32 chars → genera HS256
jwt.secret=JWTDemoSecretKey2024ForEducation
# Duracion del token en milisegundos: 3600000 = 1 hora
jwt.expiration=3600000

# ---- Cookie Configuration ----
# En produccion con HTTPS: cookie.secure=true
cookie.secure=false
# Duracion de la cookie en segundos: 3600 = 1 hora
cookie.maxAge=3600

# ---- Logging ----
logging.level.com.demo.jwtcookies=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.web=INFO

# ---- Error handling ----
server.error.include-message=always
server.error.include-binding-errors=always

# ---- Spring MVC ----
spring.mvc.pathmatch.use-suffix-pattern=false
