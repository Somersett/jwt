<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JWT Auth Demo — Login</title>
    <link rel="stylesheet" href="/css/login.css" />
</head>
<body>

<!-- ════════════════════════════════════════════════
     Fondo animado con partículas / círculos
════════════════════════════════════════════════ -->
<div class="bg-canvas" aria-hidden="true">
    <div class="particle p1"></div>
    <div class="particle p2"></div>
    <div class="particle p3"></div>
    <div class="particle p4"></div>
    <div class="particle p5"></div>
</div>

<!-- ════════════════════════════════════════════════
     Tarjeta de Login
════════════════════════════════════════════════ -->
<main class="login-wrapper">
    <div class="login-card" id="loginCard">

        <!-- Logo -->
        <div class="card-logo">
            <div class="logo-ring">
                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="24" cy="20" r="8" stroke="#3b82f6" stroke-width="2.5"/>
                    <rect x="16" y="26" width="16" height="14" rx="3" stroke="#3b82f6" stroke-width="2.5"/>
                    <line x1="24" y1="30" x2="24" y2="35" stroke="#3b82f6" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <!-- Encabezado -->
        <div class="card-header">
            <h1>JWT Auth Demo</h1>
            <p class="subtitle">Panel Administrador de Cookies &amp; JWT</p>
        </div>

        <!-- Etiquetas de tecnologías -->
        <div class="tech-badges">
            <span class="badge blue">Spring Boot</span>
            <span class="badge green">JWT</span>
            <span class="badge purple">Cookies</span>
        </div>

        <!-- Formulario -->
        <form id="loginForm" class="login-form" novalidate>

            <div class="field-group">
                <label for="username">Usuario</label>
                <div class="input-box">
                    <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path d="M10 10a4 4 0 100-8 4 4 0 000 8zm-7 8a7 7 0 1114 0H3z"/>
                    </svg>
                    <input
                        type="text"
                        id="username"
                        name="username"
                        placeholder="Ej: admin"
                        autocomplete="username"
                        required
                    />
                </div>
            </div>

            <div class="field-group">
                <label for="password">Contraseña</label>
                <div class="input-box">
                    <svg class="field-icon" viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                              d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2
                              2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z"
                              clip-rule="evenodd"/>
                    </svg>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="••••••••"
                        autocomplete="current-password"
                        required
                    />
                    <button type="button" class="toggle-password" id="togglePwd"
                            aria-label="Mostrar contraseña">
                        <svg id="eyeIcon" viewBox="0 0 20 20" fill="currentColor">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"/>
                            <path fill-rule="evenodd"
                                  d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943
                                  9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732
                                  14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z"
                                  clip-rule="evenodd"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Mensaje de error -->
            <div id="errorBox" class="error-box hidden" role="alert">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1
                          1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0
                          101.414 1.414L10 11.414l1.293 1.293a1 1 0
                          001.414-1.414L11.414 10l1.293-1.293a1 1 0
                          00-1.414-1.414L10 8.586 8.707 7.293z"
                          clip-rule="evenodd"/>
                </svg>
                <span id="errorText"></span>
            </div>

            <!-- Botón de login -->
            <button type="submit" class="btn-login" id="loginBtn">
                <span id="btnText">Iniciar Sesión</span>
                <div id="btnSpinner" class="spinner hidden"></div>
                <svg id="btnArrow" class="btn-arrow" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010
                          1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1
                          1 0 110-2h11.586l-4.293-4.293a1 1 0
                          010-1.414z"
                          clip-rule="evenodd"/>
                </svg>
            </button>
        </form>

        <!-- Credenciales demo -->
        <div class="demo-credentials">
            <div class="demo-title">
                <svg viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                          d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1
                          1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1
                          1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z"
                          clip-rule="evenodd"/>
                </svg>
                Credenciales de demo
            </div>
            <div class="demo-row">
                <button class="demo-btn" onclick="fillCredentials('admin','123456')">
                    <span class="demo-label">Admin</span>
                    <span class="demo-creds">admin / 123456</span>
                </button>
                <button class="demo-btn" onclick="fillCredentials('user','password')">
                    <span class="demo-label">User</span>
                    <span class="demo-creds">user / password</span>
                </button>
            </div>
        </div>

    </div><!-- /.login-card -->
</main>

<script src="/js/login.js"></script>
</body>
</html>
